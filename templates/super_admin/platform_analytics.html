{% extends "base.html" %}

{% block title %}Platform Analytics - Super Admin - Parking Management{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="fas fa-chart-bar"></i> Platform Analytics</h2>

<div class="row mb-4">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-chart-line"></i> Booking Trends (Last 7 Days)</h5>
            </div>
            <div class="card-body">
                <canvas id="bookingChart"></canvas>
            </div>
        </div>
    </div>
    
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-rupee-sign"></i> Revenue Trends (Last 7 Days)</h5>
            </div>
            <div class="card-body">
                <canvas id="revenueChart"></canvas>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Booking Trends Chart
    const bookingCtx = document.getElementById('bookingChart').getContext('2d');
    const bookingData = {{ booking_trends | tojson }};
    
    new Chart(bookingCtx, {
        type: 'line',
        data: {
            labels: bookingData.map(d => d.date),
            datasets: [{
                label: 'Bookings',
                data: bookingData.map(d => d.count),
                borderColor: 'rgb(75, 192, 192)',
                backgroundColor: 'rgba(75, 192, 192, 0.2)',
                tension: 0.1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: true
                }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
    
    // Revenue Trends Chart
    const revenueCtx = document.getElementById('revenueChart').getContext('2d');
    const revenueData = {{ revenue_trends | tojson }};
    
    new Chart(revenueCtx, {
        type: 'bar',
        data: {
            labels: revenueData.map(d => d.date),
            datasets: [{
                label: 'Revenue (₹)',
                data: revenueData.map(d => d.revenue),
                backgroundColor: 'rgba(54, 162, 235, 0.5)',
                borderColor: 'rgb(54, 162, 235)',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: true
                }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>
{% endblock %}
