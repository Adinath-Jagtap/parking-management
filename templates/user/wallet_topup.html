{% extends "base.html" %}

{% block title %}Top-up Wallet - Parking Management{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="fas fa-wallet"></i> Add Money to Wallet</h4>
            </div>
            <div class="card-body">
                <div class="text-center mb-4">
                    <p class="text-muted mb-1">Current Balance</p>
                    <h2 class="text-primary fw-bold mb-0">₹{{ "%.2f"|format(balance) }}</h2>
                </div>

                <hr>

                <div class="mb-3">
                    <label for="topup-amount" class="form-label fw-semibold">Top-up Amount</label>
                    <div class="input-group input-group-lg">
                        <span class="input-group-text">₹</span>
                        <input type="number" id="topup-amount" class="form-control"
                               min="50" max="10000" step="10" value="100"
                               placeholder="Enter amount" required>
                    </div>
                    <div class="form-text"><i class="fas fa-info-circle"></i> Minimum amount: ₹50 &middot; Maximum: ₹10,000</div>
                </div>

                <div class="d-flex flex-wrap gap-2 mb-4">
                    <button class="btn btn-outline-secondary btn-sm quick-amount" data-amount="50">₹50</button>
                    <button class="btn btn-outline-secondary btn-sm quick-amount" data-amount="100">₹100</button>
                    <button class="btn btn-outline-secondary btn-sm quick-amount" data-amount="200">₹200</button>
                    <button class="btn btn-outline-secondary btn-sm quick-amount" data-amount="500">₹500</button>
                    <button class="btn btn-outline-secondary btn-sm quick-amount" data-amount="1000">₹1000</button>
                </div>

                <div id="topup-error" class="alert alert-danger d-none" role="alert"></div>
                <div id="topup-success" class="alert alert-success d-none" role="alert"></div>

                <button type="button" id="topup-btn" class="btn btn-success btn-lg w-100" onclick="initiateTopup()">
                    <i class="fas fa-lock"></i> Pay Securely via Razorpay
                </button>

                <div class="text-center mt-3">
                    <a href="{{ url_for('user_wallet') }}" class="text-decoration-none">
                        <i class="fas fa-arrow-left"></i> Back to Wallet
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    // Quick amount buttons
    document.querySelectorAll('.quick-amount').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.getElementById('topup-amount').value = this.dataset.amount;
        });
    });

    function showError(message) {
        var errorDiv = document.getElementById('topup-error');
        var successDiv = document.getElementById('topup-success');
        successDiv.classList.add('d-none');
        errorDiv.textContent = message;
        errorDiv.classList.remove('d-none');
    }

    function showSuccess(message) {
        var errorDiv = document.getElementById('topup-error');
        var successDiv = document.getElementById('topup-success');
        errorDiv.classList.add('d-none');
        successDiv.textContent = message;
        successDiv.classList.remove('d-none');
    }

    function initiateTopup() {
        var amount = parseFloat(document.getElementById('topup-amount').value);
        var errorDiv = document.getElementById('topup-error');
        var btn = document.getElementById('topup-btn');

        errorDiv.classList.add('d-none');

        if (!amount || amount < 50) {
            showError('Minimum top-up amount is ₹50');
            return;
        }

        if (amount > 10000) {
            showError('Maximum top-up amount is ₹10,000');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating order...';

        fetch('{{ url_for("wallet_topup_create") }}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token() }}'
            },
            body: JSON.stringify({ amount: amount })
        })
        .then(function(response) { return response.json(); })
        .then(function(data) {
            if (!data.success) {
                showError(data.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-lock"></i> Pay Securely via Razorpay';
                return;
            }

            var options = {
                key: data.key_id,
                amount: data.amount,
                currency: data.currency,
                name: 'Parking Management',
                description: 'Wallet Top-up ₹' + amount,
                order_id: data.order_id,
                handler: function(response) {
                    verifyPayment(response, amount);
                },
                prefill: {
                    email: '{{ current_user.email }}'
                },
                theme: {
                    color: '#0d6efd'
                },
                modal: {
                    ondismiss: function() {
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-lock"></i> Pay Securely via Razorpay';
                    }
                }
            };

            var rzp = new Razorpay(options);
            rzp.open();
        })
        .catch(function() {
            showError('Something went wrong. Please try again.');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-lock"></i> Pay Securely via Razorpay';
        });
    }

    function verifyPayment(response, amount) {
        var btn = document.getElementById('topup-btn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying payment...';

        fetch('{{ url_for("wallet_topup_verify") }}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token() }}'
            },
            body: JSON.stringify({
                razorpay_order_id: response.razorpay_order_id,
                razorpay_payment_id: response.razorpay_payment_id,
                razorpay_signature: response.razorpay_signature,
                amount: amount
            })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (data.success) {
                showSuccess(data.message + ' Redirecting...');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-check"></i> Payment Successful';
                setTimeout(function() {
                    window.location.href = '{{ url_for("user_wallet") }}';
                }, 2000);
            } else {
                showError(data.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-lock"></i> Pay Securely via Razorpay';
            }
        })
        .catch(function() {
            showError('Verification failed. If money was deducted, it will be refunded automatically.');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-lock"></i> Pay Securely via Razorpay';
        });
    }
</script>
{% endblock %}
