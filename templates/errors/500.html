{% extends "base.html" %}

{% block title %}500 - Server Error - ParkEasy{% endblock %}

{% block extra_css %}
<style>
    .pk-error-page {
        min-height: calc(100vh - 200px);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        text-align: center; padding: 40px 20px;
        position: relative; overflow: hidden;
    }
    .pk-error-code {
        font-size: 8rem; font-weight: 900;
        color: var(--pk-primary); line-height: 1;
        text-shadow: 0 4px 24px rgba(232,89,12,0.15);
    }
    .pk-error-msg { font-size: 1.4rem; font-weight: 800; margin: 12px 0 8px; }
    .pk-error-desc { color: var(--pk-text-muted); max-width: 400px; margin-bottom: 28px; }
    .pk-error-icon {
        width: 80px; height: 80px; border-radius: 50%;
        background: var(--pk-secondary-light); color: var(--pk-secondary);
        display: flex; align-items: center; justify-content: center;
        font-size: 2rem; margin-bottom: 20px;
        animation: wobble 2s ease-in-out infinite;
    }
    @keyframes wobble {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(-8deg); }
        75% { transform: rotate(8deg); }
    }
    .pk-smoke {
        position: absolute; bottom: 40px;
        width: 100%; display: flex; justify-content: center; gap: 16px;
    }
    .pk-smoke-puff {
        width: 12px; height: 12px; border-radius: 50%;
        background: rgba(156,163,175,0.3);
        animation: smokePuff 2.5s ease-in-out infinite;
    }
    .pk-smoke-puff:nth-child(2) { animation-delay: 0.5s; width: 16px; height: 16px; }
    .pk-smoke-puff:nth-child(3) { animation-delay: 1s; width: 10px; height: 10px; }
    @keyframes smokePuff {
        0% { transform: translateY(0) scale(1); opacity: 0.4; }
        100% { transform: translateY(-40px) scale(2); opacity: 0; }
    }
    @media (max-width: 767px) {
        .pk-error-code { font-size: 5rem; }
        .pk-error-msg { font-size: 1.1rem; }
    }
</style>
{% endblock %}

{% block content %}
<div class="pk-error-page fade-in">
    <div class="pk-error-icon"><i class="fas fa-exclamation-triangle"></i></div>
    <div class="pk-error-code">500</div>
    <h2 class="pk-error-msg">Server Error</h2>
    <p class="pk-error-desc">Something went wrong on our end. We're working to fix it. Please try again in a few moments.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg px-4">
        <i class="fas fa-home me-2"></i>Go to Homepage
    </a>
    <div class="pk-smoke">
        <div class="pk-smoke-puff"></div>
        <div class="pk-smoke-puff"></div>
        <div class="pk-smoke-puff"></div>
    </div>
</div>
{% endblock %}
