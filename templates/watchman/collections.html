{% extends "base.html" %}

{% block title %}My Collections - Watchman{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="fas fa-hand-holding-usd"></i> My Collections</h2>

<!-- Date Range Filter -->
<div class="card mb-4">
    <div class="card-body">
        <form method="GET" id="filterForm" class="row g-3 align-items-end">
            <div class="col-md-4">
                <label for="from_date" class="form-label fw-semibold">From Date</label>
                <input type="date" name="from_date" id="from_date" class="form-control" value="{{ from_date }}">
            </div>
            <div class="col-md-4">
                <label for="to_date" class="form-label fw-semibold">To Date</label>
                <input type="date" name="to_date" id="to_date" class="form-control" value="{{ to_date }}">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">
                    <i class="fas fa-filter"></i> Filter
                </button>
            </div>
            <div class="col-md-2">
                <a href="?" class="btn btn-outline-secondary w-100">
                    <i class="fas fa-times"></i> Clear
                </a>
            </div>
        </form>
    </div>
</div>

<!-- Totals -->
<div class="row g-3 mb-4" id="totalsRow">
    <div class="col-md-4">
        <div class="card border-0 text-white" style="background:linear-gradient(135deg,#10b981,#059669);border-radius:14px;">
            <div class="card-body text-center py-3">
                <div class="fs-6 opacity-75"><i class="fas fa-money-bill-wave me-1"></i> Total Cash</div>
                <div class="fs-3 fw-bold" id="totalCash">—</div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card border-0 text-white" style="background:linear-gradient(135deg,#3b82f6,#2563eb);border-radius:14px;">
            <div class="card-body text-center py-3">
                <div class="fs-6 opacity-75"><i class="fas fa-mobile-alt me-1"></i> Total UPI</div>
                <div class="fs-3 fw-bold" id="totalUpi">—</div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card border-0 text-white" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:14px;">
            <div class="card-body text-center py-3">
                <div class="fs-6 opacity-75"><i class="fas fa-rupee-sign me-1"></i> Grand Total</div>
                <div class="fs-3 fw-bold" id="totalAll">—</div>
            </div>
        </div>
    </div>
</div>

<!-- Collections Table -->
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0"><i class="fas fa-list"></i> Collection Records</h5>
        <span class="badge bg-secondary" id="countBadge">Loading...</span>
    </div>
    <div class="card-body p-0">
        <div id="tableWrapper">
            <div class="text-center py-5 text-muted">
                <div class="spinner-border text-primary mb-3" role="status"></div>
                <p class="mb-0">Loading collections...</p>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    const fromDate = document.getElementById('from_date').value;
    const toDate = document.getElementById('to_date').value;

    async function loadCollections() {
        let url = '/watchman/collections';
        const params = new URLSearchParams();
        if (fromDate) params.append('from_date', fromDate);
        if (toDate) params.append('to_date', toDate);
        if ([...params].length) url += '?' + params.toString();

        try {
            const resp = await fetch(url);
            const data = await resp.json();

            document.getElementById('totalCash').textContent = '₹' + (data.total_cash || 0).toFixed(2);
            document.getElementById('totalUpi').textContent = '₹' + (data.total_upi || 0).toFixed(2);
            document.getElementById('totalAll').textContent = '₹' + (data.total_collected || 0).toFixed(2);
            document.getElementById('countBadge').textContent = (data.count || 0) + ' record' + (data.count !== 1 ? 's' : '');

            const wrapper = document.getElementById('tableWrapper');
            if (!data.collections || data.collections.length === 0) {
                wrapper.innerHTML = `
                    <div class="text-center py-5 text-muted">
                        <i class="fas fa-inbox" style="font-size:3rem;opacity:0.3;"></i>
                        <p class="mt-3 mb-0">No collections found for the selected period.</p>
                    </div>`;
                return;
            }

            const rows = data.collections.map(c => {
                const methodBadge = c.method === 'cash'
                    ? '<span class="badge bg-success">Cash</span>'
                    : '<span class="badge bg-info">UPI</span>';
                const viewBtn = c.invoice_id
                    ? `<a href="/invoice/${escapeHtml(c.invoice_id)}" class="btn btn-sm btn-outline-primary" title="View Invoice"><i class="fas fa-eye"></i></a>`
                    : '<span class="text-muted">—</span>';
                return `<tr>
                    <td><code>${escapeHtml(c.invoice_number)}</code></td>
                    <td><span class="badge bg-secondary">${escapeHtml(c.vehicle_number)}</span></td>
                    <td class="fw-bold text-success">₹${parseFloat(c.amount).toFixed(2)}</td>
                    <td>${methodBadge}</td>
                    <td class="text-muted" style="font-size:0.88rem;">${escapeHtml(c.collected_at)}</td>
                    <td>${viewBtn}</td>
                </tr>`;
            }).join('');

            wrapper.innerHTML = `
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Invoice #</th>
                                <th>Vehicle</th>
                                <th>Amount</th>
                                <th>Method</th>
                                <th>Collected At</th>
                                <th>Invoice</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                        <tfoot class="table-secondary fw-bold">
                            <tr>
                                <td colspan="2">Totals (${data.count} records)</td>
                                <td>₹${(data.total_collected || 0).toFixed(2)}</td>
                                <td>
                                    <span class="badge bg-success me-1">Cash ₹${(data.total_cash || 0).toFixed(2)}</span>
                                    <span class="badge bg-info">UPI ₹${(data.total_upi || 0).toFixed(2)}</span>
                                </td>
                                <td></td>
                                <td></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>`;
        } catch (err) {
            console.error('Load collections error:', err);
            document.getElementById('tableWrapper').innerHTML = `
                <div class="alert alert-danger m-3">Failed to load collections. Please refresh the page.</div>`;
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(text || ''));
        return div.innerHTML;
    }

    loadCollections();
</script>
{% endblock %}
