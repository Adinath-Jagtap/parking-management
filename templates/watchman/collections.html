{% extends "base.html" %}

{% block title %}My Collections - Watchman - ParkEasy{% endblock %}

{% block content %}
<h2 class="pk-page-title fade-in"><i class="fas fa-hand-holding-usd"></i> My Collections</h2>

<!-- Date Range Filter -->
<div class="card mb-4 fade-in">
    <div class="card-body">
        <form method="GET" id="filterForm" class="row g-3 align-items-end">
            <div class="col-6 col-md-4">
                <label for="from_date" class="form-label">From Date</label>
                <input type="date" name="from_date" id="from_date" class="form-control" value="{{ from_date }}">
            </div>
            <div class="col-6 col-md-4">
                <label for="to_date" class="form-label">To Date</label>
                <input type="date" name="to_date" id="to_date" class="form-control" value="{{ to_date }}">
            </div>
            <div class="col-6 col-md-2">
                <button type="submit" class="btn btn-primary w-100"><i class="fas fa-filter me-1"></i>Filter</button>
            </div>
            <div class="col-6 col-md-2">
                <a href="?" class="btn btn-outline-secondary w-100"><i class="fas fa-times me-1"></i>Clear</a>
            </div>
        </form>
    </div>
</div>

<!-- Totals -->
<div class="row g-3 mb-4 fade-in" id="totalsRow">
    <div class="col-4">
        <div class="pk-stat-card accent-green">
            <div class="text-center">
                <div class="stat-label"><i class="fas fa-money-bill-wave me-1"></i>Cash</div>
                <div class="stat-value" id="totalCash" style="color:var(--pk-success);">—</div>
            </div>
        </div>
    </div>
    <div class="col-4">
        <div class="pk-stat-card accent-amber">
            <div class="text-center">
                <div class="stat-label"><i class="fas fa-mobile-alt me-1"></i>UPI</div>
                <div class="stat-value" id="totalUpi" style="color:var(--pk-secondary);">—</div>
            </div>
        </div>
    </div>
    <div class="col-4">
        <div class="pk-stat-card">
            <div class="text-center">
                <div class="stat-label"><i class="fas fa-rupee-sign me-1"></i>Total</div>
                <div class="stat-value" id="totalAll" style="color:var(--pk-primary);">—</div>
            </div>
        </div>
    </div>
</div>

<!-- Collections Table -->
<div class="card fade-in">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h6 class="mb-0 fw-bold"><i class="fas fa-list me-2 text-pk-primary"></i>Collection Records</h6>
        <span class="badge bg-secondary" id="countBadge">Loading...</span>
    </div>
    <div class="card-body p-0">
        <div id="tableWrapper">
            <div class="text-center py-5" style="color:var(--pk-text-muted);">
                <div class="spinner-border mb-3" role="status" style="color:var(--pk-primary);"></div>
                <p class="mb-0">Loading collections...</p>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    const fromDate = document.getElementById('from_date').value;
    const toDate = document.getElementById('to_date').value;

    async function loadCollections() {
        let url = '/watchman/collections';
        const params = new URLSearchParams();
        if (fromDate) params.append('from_date', fromDate);
        if (toDate) params.append('to_date', toDate);
        if ([...params].length) url += '?' + params.toString();

        try {
            const resp = await fetch(url);
            const data = await resp.json();

            document.getElementById('totalCash').textContent = '₹' + (data.total_cash || 0).toFixed(2);
            document.getElementById('totalUpi').textContent = '₹' + (data.total_upi || 0).toFixed(2);
            document.getElementById('totalAll').textContent = '₹' + (data.total_collected || 0).toFixed(2);
            document.getElementById('countBadge').textContent = (data.count || 0) + ' record' + (data.count !== 1 ? 's' : '');

            const wrapper = document.getElementById('tableWrapper');
            if (!data.collections || data.collections.length === 0) {
                wrapper.innerHTML = `
                    <div class="pk-empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>No collections found for the selected period.</p>
                    </div>`;
                return;
            }

            const rows = data.collections.map(c => {
                const methodBadge = c.method === 'cash'
                    ? '<span class="badge bg-success">Cash</span>'
                    : '<span class="badge bg-warning">UPI</span>';
                const viewBtn = c.invoice_id
                    ? `<a href="/invoice/${escapeHtml(c.invoice_id)}" class="btn btn-sm btn-outline-primary" title="View Invoice"><i class="fas fa-eye"></i></a>`
                    : '<span style="color:var(--pk-text-light);">—</span>';
                return `<tr>
                    <td data-label="Invoice #"><code>${escapeHtml(c.invoice_number)}</code></td>
                    <td data-label="Vehicle"><span class="badge bg-secondary">${escapeHtml(c.vehicle_number)}</span></td>
                    <td data-label="Amount" class="fw-bold" style="color:var(--pk-success);">₹${parseFloat(c.amount).toFixed(2)}</td>
                    <td data-label="Method">${methodBadge}</td>
                    <td data-label="Collected At" style="color:var(--pk-text-muted);font-size:0.88rem;">${escapeHtml(c.collected_at)}</td>
                    <td data-label="Invoice">${viewBtn}</td>
                </tr>`;
            }).join('');

            wrapper.innerHTML = `
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0 table-responsive-cards">
                        <thead>
                            <tr>
                                <th>Invoice #</th>
                                <th>Vehicle</th>
                                <th>Amount</th>
                                <th>Method</th>
                                <th>Collected At</th>
                                <th>Invoice</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                        <tfoot style="background:var(--pk-primary-light);">
                            <tr>
                                <td colspan="2" class="fw-bold">Totals (${data.count} records)</td>
                                <td class="fw-bold">₹${(data.total_collected || 0).toFixed(2)}</td>
                                <td>
                                    <span class="badge bg-success me-1">Cash ₹${(data.total_cash || 0).toFixed(2)}</span>
                                    <span class="badge bg-warning">UPI ₹${(data.total_upi || 0).toFixed(2)}</span>
                                </td>
                                <td></td>
                                <td></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>`;
        } catch (err) {
            console.error('Load collections error:', err);
            document.getElementById('tableWrapper').innerHTML = `
                <div class="alert alert-danger m-3">Failed to load collections. Please refresh the page.</div>`;
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(text || ''));
        return div.innerHTML;
    }

    loadCollections();
</script>
{% endblock %}
